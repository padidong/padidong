<svg width="100%" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="30%" stop-color="#1A0F10"/>
      <stop offset="70%" stop-color="#15100A"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#da4453"/>
      <stop offset="35%" stop-color="#e96443"/>
      <stop offset="65%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#e65c00"/>
    </linearGradient>
    <linearGradient id="textShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="50%" stop-color="#FFD4A3"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,107,53,0.03)" stroke-width="1"/>
    </pattern>
    <pattern id="dots" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="0.8" fill="rgba(218,68,83,0.08)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bgGrad)" rx="0"/>
  <rect width="900" height="220" fill="url(#grid)" rx="0"/>
  <rect width="900" height="220" fill="url(#dots)" rx="0"/>

  <!-- Top accent bar -->
  <rect width="900" height="2" fill="url(#accentLine)"/>

  <!-- Left decorative bracket -->
  <path d="M 55 45 L 25 45 L 25 175 L 55 175" fill="none" stroke="#da4453" stroke-width="1.5" opacity="0.4"/>
  <!-- Right decorative bracket -->
  <path d="M 845 45 L 875 45 L 875 175 L 845 175" fill="none" stroke="#e65c00" stroke-width="1.5" opacity="0.4"/>

  <!-- Terminal dots left -->
  <circle cx="38" cy="38" r="4" fill="#da4453" opacity="0.6"/>
  <circle cx="50" cy="38" r="4" fill="#e96443" opacity="0.4"/>
  <circle cx="62" cy="38" r="4" fill="#e65c00" opacity="0.2"/>

  <!-- Name with glow -->
  <text x="450" y="95" text-anchor="middle" fill="white" font-size="42" font-weight="bold" font-family="'Segoe UI', Arial, sans-serif" filter="url(#softGlow)" letter-spacing="2">P a t i p h a t&nbsp;&nbsp; J e e n c h u m</text>

  <!-- Accent underline -->
  <rect x="250" y="115" width="400" height="2" rx="1" fill="url(#accentLine)" filter="url(#subtleGlow)" opacity="0.7"/>

  <!-- Subtitle -->
  <text x="450" y="145" text-anchor="middle" fill="#FF6B35" font-size="14" font-family="'Courier New', monospace" letter-spacing="1">☁️ DEVOPS &nbsp;·&nbsp; 🔐 CYBER SECURITY &nbsp;·&nbsp; 🚀 CLOUD ARCHITECT</text>

  <!-- Location -->
  <text x="450" y="170" text-anchor="middle" fill="#888888" font-size="11" font-family="'Courier New', monospace">📍 Songkhla, Thailand &nbsp;|&nbsp; 🎓 Computer Engineering</text>

  <!-- Bottom accent bar -->
  <rect y="218" width="900" height="2" fill="url(#accentLine)"/>

  <!-- Decorative elements -->
  <line x1="150" y1="60" x2="150" y2="80" stroke="#da4453" stroke-width="0.5" opacity="0.3"/>
  <line x1="750" y1="140" x2="750" y2="160" stroke="#e65c00" stroke-width="0.5" opacity="0.3"/>

  <circle cx="120" cy="180" r="1.5" fill="#FF6B35" opacity="0.3"/>
  <circle cx="780" cy="55" r="1.5" fill="#FF6B35" opacity="0.3"/>
  <circle cx="680" cy="195" r="1" fill="#e96443" opacity="0.25"/>
  <circle cx="220" cy="35" r="1" fill="#da4453" opacity="0.25"/>
</svg>
